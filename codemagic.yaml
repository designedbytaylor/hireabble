workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Hireabble App Store Connect
    environment:
      node: 18
      xcode: latest
      groups:
        - hireabble_env
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hireabble.app
      vars:
        BUNDLE_ID: com.hireabble.app
        XCODE_PROJECT: frontend/ios/App/App.xcodeproj
        XCODE_SCHEME: App
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install frontend dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps
      - name: Build React app
        script: |
          cd frontend
          npx craco build
      - name: Sync Capacitor iOS
        script: |
          cd frontend
          npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd frontend/ios/App
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" || echo 0)
          agvtool new-version -all $((LATEST_BUILD + 1))
      - name: Build IPA
        script: |
          cd frontend/ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false

  android-release:
    name: Android Release
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: 18
      java: 17
      groups:
        - hireabble_env
      android_signing:
        - hireabble_keystore
      vars:
        PACKAGE_NAME: com.hireabble.app
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install frontend dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps
      - name: Build React app
        script: |
          cd frontend
          npx craco build
      - name: Sync Capacitor Android
        script: |
          cd frontend
          npx cap sync android
      - name: Set Android version
        script: |
          cd frontend/android
          LATEST_BUILD=$(google-play get-latest-build-number --package-name "$PACKAGE_NAME" || echo 0)
          NEW_BUILD=$((LATEST_BUILD + 1))
          echo "Setting versionCode to $NEW_BUILD"
          sed -i "s/versionCode [0-9]*/versionCode $NEW_BUILD/" app/build.gradle
      - name: Build AAB
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - frontend/android/app/build/outputs/**/*.aab
      - frontend/android/app/build/outputs/**/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
