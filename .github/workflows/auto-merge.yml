name: Auto-merge claude branches to main

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const base = 'main';

            // Check if PR already exists for this branch
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base,
              state: 'open',
            });

            let pr;
            if (existingPRs.length > 0) {
              pr = existingPRs[0];
              console.log(`PR #${pr.number} already exists`);
            } else {
              const { data: newPR } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Auto-merge: ${branch}`,
                head: branch,
                base,
                body: `Automated PR to merge \`${branch}\` into \`${base}\`.`,
              });
              pr = newPR;
              console.log(`Created PR #${pr.number}`);
            }

            // Wait a moment for PR to be fully created
            await new Promise(r => setTimeout(r, 5000));

            // Try immediate merge first (works when no branch protection)
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              console.log(`PR #${pr.number} merged successfully`);
              return;
            } catch (error) {
              console.log(`Immediate merge failed: ${error.message}`);
            }

            // If immediate merge failed, retry with longer backoff for checks
            const maxRetries = 10;
            const delaySeconds = 30;

            for (let attempt = 2; attempt <= maxRetries; attempt++) {
              console.log(`Waiting ${delaySeconds}s before retry ${attempt}/${maxRetries}...`);
              await new Promise(r => setTimeout(r, delaySeconds * 1000));

              try {
                // Check PR mergeable status first
                const { data: prStatus } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });

                console.log(`PR mergeable: ${prStatus.mergeable}, state: ${prStatus.mergeable_state}`);

                if (prStatus.mergeable === false) {
                  console.log('PR has merge conflicts, cannot auto-merge');
                  return;
                }

                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                });
                console.log(`PR #${pr.number} merged successfully on attempt ${attempt}`);
                return;
              } catch (error) {
                console.log(`Attempt ${attempt}/${maxRetries} failed: ${error.message}`);
              }
            }

            // Last resort: enable auto-merge so it merges when checks pass
            try {
              const { data: prData } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              await github.graphql(`
                mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: $mergeMethod
                  }) {
                    pullRequest { number }
                  }
                }
              `, {
                pullRequestId: prData.node_id,
                mergeMethod: 'SQUASH',
              });
              console.log(`Auto-merge enabled for PR #${pr.number} - will merge when checks pass`);
            } catch (autoMergeError) {
              console.log(`Could not enable auto-merge: ${autoMergeError.message}`);
              console.log(`PR #${pr.number} created but needs manual merge.`);
            }
