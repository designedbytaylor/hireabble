name: Auto-merge claude branches to main

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-rebase and merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          BASE="main"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Rebase onto main to avoid merge conflicts
          git fetch origin "$BASE"
          git rebase "origin/$BASE" || {
            echo "Rebase failed - aborting"
            git rebase --abort
            exit 1
          }

          # Force push the rebased branch
          git push origin "$BRANCH" --force

      - name: Create PR and merge
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const base = 'main';

            // Check if PR already exists for this branch
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base,
              state: 'open',
            });

            let pr;
            if (existingPRs.length > 0) {
              pr = existingPRs[0];
              console.log(`PR #${pr.number} already exists`);
            } else {
              const { data: newPR } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Auto-merge: ${branch}`,
                head: branch,
                base,
                body: `Automated PR to merge \`${branch}\` into \`${base}\`.`,
              });
              pr = newPR;
              console.log(`Created PR #${pr.number}`);
            }

            // Wait for PR to be ready after rebase
            await new Promise(r => setTimeout(r, 5000));

            // Retry merge with backoff
            const maxRetries = 10;
            const delaySeconds = 30;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                });
                console.log(`PR #${pr.number} merged successfully on attempt ${attempt}`);
                return;
              } catch (error) {
                console.log(`Attempt ${attempt}/${maxRetries} failed: ${error.message}`);
                if (attempt < maxRetries) {
                  console.log(`Waiting ${delaySeconds}s before retry...`);
                  await new Promise(r => setTimeout(r, delaySeconds * 1000));
                }
              }
            }

            // Last resort: enable auto-merge so it merges when checks pass
            try {
              const { data: prData } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              await github.graphql(`
                mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: $mergeMethod
                  }) {
                    pullRequest { number }
                  }
                }
              `, {
                pullRequestId: prData.node_id,
                mergeMethod: 'SQUASH',
              });
              console.log(`Auto-merge enabled for PR #${pr.number} - will merge when checks pass`);
            } catch (autoMergeError) {
              console.log(`Could not enable auto-merge: ${autoMergeError.message}`);
              console.log(`PR #${pr.number} created but needs manual merge.`);
            }
