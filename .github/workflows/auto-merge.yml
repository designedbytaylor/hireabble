name: Auto-merge claude branches to main

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and merge
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const base = 'main';

            // Check if PR already exists for this branch
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base,
              state: 'open',
            });

            let pr;
            if (existingPRs.length > 0) {
              pr = existingPRs[0];
              console.log(`PR #${pr.number} already exists`);
            } else {
              // Create new PR
              const { data: newPR } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Auto-merge: ${branch}`,
                head: branch,
                base,
                body: `Automated PR to merge \`${branch}\` into \`${base}\`.`,
              });
              pr = newPR;
              console.log(`Created PR #${pr.number}`);
            }

            // Enable auto-merge so GitHub merges once all checks pass
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              console.log(`PR #${pr.number} merged successfully`);
            } catch (error) {
              console.log(`Immediate merge failed (likely pending checks): ${error.message}`);
              console.log('Enabling auto-merge to merge once checks pass...');

              // Use GraphQL to enable auto-merge (waits for required checks)
              try {
                const { data: prData } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });

                await github.graphql(`
                  mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $pullRequestId,
                      mergeMethod: $mergeMethod
                    }) {
                      pullRequest { number }
                    }
                  }
                `, {
                  pullRequestId: prData.node_id,
                  mergeMethod: 'SQUASH',
                });
                console.log(`Auto-merge enabled for PR #${pr.number}`);
              } catch (autoMergeError) {
                console.log(`Could not enable auto-merge: ${autoMergeError.message}`);
                core.setFailed(`Could not merge or enable auto-merge for PR #${pr.number}: ${autoMergeError.message}`);
              }
            }
