name: Auto-merge claude branches to main

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const base = 'main';

            // Check if PR already exists for this branch
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base,
              state: 'open',
            });

            let pr;
            if (existingPRs.length > 0) {
              pr = existingPRs[0];
              console.log(`PR #${pr.number} already exists`);
            } else {
              const { data: newPR } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Auto-merge: ${branch}`,
                head: branch,
                base,
                body: `Automated PR to merge \`${branch}\` into \`${base}\`.`,
              });
              pr = newPR;
              console.log(`Created PR #${pr.number}`);
            }

            // Retry merge with backoff - wait for checks to complete
            const maxRetries = 6;
            const delaySeconds = 30;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                });
                console.log(`PR #${pr.number} merged successfully on attempt ${attempt}`);
                return;
              } catch (error) {
                console.log(`Attempt ${attempt}/${maxRetries} failed: ${error.message}`);
                if (attempt < maxRetries) {
                  console.log(`Waiting ${delaySeconds}s before retry...`);
                  await new Promise(r => setTimeout(r, delaySeconds * 1000));
                }
              }
            }

            // If all retries failed, try enabling auto-merge as last resort
            try {
              const { data: prData } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              await github.graphql(`
                mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: $mergeMethod
                  }) {
                    pullRequest { number }
                  }
                }
              `, {
                pullRequestId: prData.node_id,
                mergeMethod: 'SQUASH',
              });
              console.log(`Auto-merge enabled for PR #${pr.number}`);
            } catch (autoMergeError) {
              console.log(`Could not enable auto-merge: ${autoMergeError.message}`);
              // Don't fail the workflow - the PR exists and can be merged manually if needed
              console.log(`PR #${pr.number} created but could not be auto-merged. Please merge manually or enable auto-merge in repo settings.`);
            }
