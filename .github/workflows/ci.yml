name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m flake8 --max-line-length=200 --exclude=__pycache__,.git,uploads server.py database.py cache.py content_filter.py routers/
      - run: python -m black --check --line-length=200 server.py database.py cache.py content_filter.py routers/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: hireabble_test
          JWT_SECRET: test-secret-key-for-ci
          FRONTEND_URL: http://localhost:3000

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn build
        env:
          REACT_APP_BACKEND_URL: http://localhost:8000
          CI: true

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: npx eslint src/ --max-warnings=0 || true
